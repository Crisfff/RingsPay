<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f17" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>RingsPay</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>

<body>
  <main class="stage stage--mobile">
    <section class="phone" aria-label="RingsPay UI mock">
      <div class="screen">

        <!-- Top bar -->
        <header class="topbar">
          <div class="time">9:41</div>
          <div class="island" aria-hidden="true"></div>
          <div class="status" aria-hidden="true">
            <span class="sig"></span>
            <span class="wifi"></span>
            <span class="bat"></span>
          </div>
        </header>

        <!-- Greeting + total -->
        <section class="hero">
          <div class="hero-left">
            <p class="hello">Hi Ben! Welcome</p>
            <p class="sub">to your wallet</p>
          </div>

          <div class="hero-actions">
            <button class="iconbtn" aria-label="Menu">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </button>
            <button class="iconbtn" aria-label="Notifications">
              <span class="bell" aria-hidden="true"></span>
            </button>
          </div>

          <div class="balance">
            <div class="currency">
              <span class="coin">$</span>
              <span class="pill">USD</span>
            </div>

            <div class="amount">
              <span class="big">$12.329</span><span class="dec">,20</span>
            </div>

            <div class="badge up">↗ +2.10%</div>
          </div>
        </section>

        <!-- Action bar -->
        <section class="actions">
          <button class="action left" type="button">
            <span class="label">Send</span>
            <span class="miniicon" aria-hidden="true">↗</span>
          </button>

          <button class="action mid" type="button" aria-label="Scan">
            <span class="scan" aria-hidden="true"></span>
          </button>

          <button class="action right" type="button">
            <span class="miniicon" aria-hidden="true">↓</span>
            <span class="label">Request</span>
          </button>
        </section>

        <!-- Cards -->
        <section class="cards">
          <div class="card">
            <div class="card-head">
              <h3>Send Again</h3>
            </div>

            <div class="avatars">
              <div class="avatar a1" title="Alex"></div>
              <div class="avatar a2" title="Mia"></div>
              <div class="avatar a3" title="John"></div>
              <button class="avatar add" type="button" aria-label="Add person">+</button>
            </div>
          </div>

          <div class="card">
            <div class="card-head row">
              <div>
                <h3>Your Income</h3>
                <p class="muted">This Month</p>
              </div>
              <button class="chip" type="button" aria-label="Download">
                <span aria-hidden="true">↓</span>
              </button>
            </div>

            <div class="income">
              <div class="spark">
                <svg viewBox="0 0 240 80" aria-hidden="true">
                  <path class="line" d="M0,55 C30,35 50,60 80,45 C110,30 130,60 160,46 C190,32 205,45 240,34" />
                  <path class="fill" d="M0,55 C30,35 50,60 80,45 C110,30 130,60 160,46 C190,32 205,45 240,34 L240,80 L0,80 Z" />
                </svg>
              </div>

              <div class="income-foot">
                <div class="income-amt">$2.432,43</div>
                <div class="badge up small">↗ +2.10%</div>
              </div>
            </div>
          </div>
        </section>

        <!-- Recent activity -->
        <section class="activity">
          <div class="card-head">
            <h3>Recent Activity</h3>
          </div>

          <div class="list">
            <div class="item">
              <div class="left">
                <div class="logo drib" aria-hidden="true"></div>
                <div>
                  <div class="title">Dribbble</div>
                  <div class="muted">Yesterday</div>
                </div>
              </div>
              <div class="right">
                <div class="val">-$15</div>
                <div class="arrow" aria-hidden="true">→</div>
              </div>
            </div>

            <div class="item">
              <div class="left">
                <div class="logo user" aria-hidden="true"></div>
                <div>
                  <div class="title">Hannah Jones</div>
                  <div class="muted">3h ago</div>
                </div>
              </div>
              <div class="right">
                <div class="val plus">+$200</div>
                <div class="arrow" aria-hidden="true">→</div>
              </div>
            </div>
          </div>
        </section>

        <!-- Brand -->
        <footer class="brand">
          RINGSPAY
        </footer>

      </div>
    </section>
  </main>
</body>
</html>
